workflows:
  ios-app-store:
    name: iOS App Store Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      groups:
        - app_store_credentials # APP_STORE_CONNECT_PRIVATE_KEY, KEY_IDENTIFIER, ISSUER_ID
        - ios_signing # CERTIFICATE_P12_BASE64, CERTIFICATE_PASSWORD, PROVISIONING_PROFILE_BASE64
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.mahj.learn"
        APP_STORE_APPLE_ID: 6762031478
      node: 20
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install npm dependencies
        script: |
          npm ci
      - name: Build Next.js static export
        script: |
          npm run build
      - name: Capacitor sync
        script: |
          npx cap sync ios
      - name: Install iOS pods
        script: |
          cd ios/App
          pod install
      - name: Set up code signing
        script: |
          set -e
          # 1. Initialize the keychain
          keychain initialize

          # 2. Decode the .p12 certificate from base64 and import it
          printf '%s' "$CERTIFICATE_P12_BASE64" | base64 --decode > /tmp/MAHJ_distribution.p12
          ls -la /tmp/MAHJ_distribution.p12
          file /tmp/MAHJ_distribution.p12
          keychain add-certificates \
            --certificate /tmp/MAHJ_distribution.p12 \
            --certificate-password "$CERTIFICATE_PASSWORD"

          # 3. Decode the provisioning profile from base64 and install it
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_DIR"
          printf '%s' "$PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PROFILE_DIR/MAHJ_App_Store.mobileprovision"

          # 4. Apply profiles to the Xcode project
          xcode-project use-profiles
      - name: Set build number and version
        script: |
          cd ios/App
          agvtool new-version -all $(($BUILD_NUMBER + 100))
          # Force marketing version in pbxproj
          sed -i '' 's/MARKETING_VERSION = [^;]*/MARKETING_VERSION = 1.1/' App.xcodeproj/project.pbxproj
          # Force version directly in Info.plist (in case pbxproj variable doesn't resolve)
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString 1.1" App/Info.plist
          # Verify
          echo "=== pbxproj ==="
          grep MARKETING_VERSION App.xcodeproj/project.pbxproj
          echo "=== Info.plist ==="
          /usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" App/Info.plist
          /usr/libexec/PlistBuddy -c "Print :CFBundleVersion" App/Info.plist
      - name: Build ipa
        script: |
          # Final version override right before build
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString 1.1" ios/App/App/Info.plist
          sed -i '' 's/MARKETING_VERSION = [^;]*/MARKETING_VERSION = 1.1/' ios/App/App.xcodeproj/project.pbxproj
          echo "=== FINAL CHECK ==="
          /usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" ios/App/App/Info.plist
          grep MARKETING_VERSION ios/App/App.xcodeproj/project.pbxproj
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
      - name: Upload to App Store Connect
        script: |
          APP_FILE=$(find $CM_BUILD_DIR/build/ios/ipa -name "*.ipa")
          # Debug: check what version is in the IPA
          unzip -p "$APP_FILE" Payload/App.app/Info.plist > /tmp/info.plist || true
          plutil -p /tmp/info.plist | grep -i version || true
          # Upload only (don't auto-submit)
          app-store-connect publish \
            --path "$APP_FILE" \
            --app-version "1.1"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
