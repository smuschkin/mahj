workflows:
  ios-app-store:
    name: iOS App Store Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      groups:
        - app_store_credentials # contains APP_STORE_CONNECT_PRIVATE_KEY, KEY_IDENTIFIER, ISSUER_ID
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.mahj.learn"
        APP_STORE_APPLE_ID: 6762031478
      node: 20
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install npm dependencies
        script: |
          npm ci
      - name: Build Next.js static export
        script: |
          npm run build
      - name: Capacitor sync
        script: |
          npx cap sync ios
      - name: Install iOS pods
        script: |
          cd ios/App
          pod install
      - name: Set up code signing
        script: |
          keychain initialize
          # Register the bundle ID first (idempotent)
          app-store-connect bundle-ids register "$BUNDLE_ID" \
            --name "MAHJ" || echo "Bundle ID already registered"
          # Fetch all signing files for iOS App Store distribution
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --platform IOS \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Set build number
        script: |
          cd ios/App
          agvtool new-version -all $(($BUILD_NUMBER + 100))
      - name: Build ipa
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --archive-flags="-allowProvisioningUpdates"
      - name: Upload to App Store Connect
        script: |
          APP_FILE=$(find $CM_BUILD_DIR/build/ios/ipa -name "*.ipa")
          app-store-connect publish \
            --path "$APP_FILE"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
